name: Build macOS App

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyinstaller opencv-python numpy pillow pyside6

      - name: Build with PyInstaller (onedir, same as Windows)
        run: |
          python -m PyInstaller --onedir \
            --windowed \
            --name "TCG卡片居中度检测" \
            --add-data "src/card_centering:card_centering" \
            --hidden-import cv2 \
            --hidden-import numpy \
            --hidden-import PIL \
            --hidden-import shiboken6 \
            --hidden-import PySide6.QtCore \
            --hidden-import PySide6.QtGui \
            --hidden-import PySide6.QtWidgets \
            --hidden-import PySide6.QtNetwork \
            --hidden-import cv2.data \
            --hidden-import cv2.error \
            --hidden-import cv2.misc \
            --hidden-import cv2.utils \
            --hidden-import numpy._core \
            --hidden-import numpy._core.multiarray \
            --hidden-import numpy._core.umath \
            --hidden-import numpy.linalg \
            --hidden-import numpy.fft \
            --hidden-import numpy.random \
            --exclude-module tkinter \
            --exclude-module matplotlib \
            --exclude-module scipy \
            --exclude-module pytest \
            --clean \
            launcher.py

      - name: Inject camera permission into Info.plist
        run: |
          PLIST="dist/TCG卡片居中度检测.app/Contents/Info.plist"
          if [ ! -f "$PLIST" ]; then
            echo "ERROR: Info.plist not found at $PLIST"
            find dist -name "*.app" -type d 2>/dev/null || ls -la dist/
            exit 1
          fi
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'Camera access is required to capture card photos for centering analysis.'" "$PLIST"
          echo "✓ Camera permission added to Info.plist"

      - name: Verify .app
        run: |
          echo "=== Info.plist ==="
          plutil -p "dist/TCG卡片居中度检测.app/Contents/Info.plist"
          echo ""
          echo "=== .app contents ==="
          ls -la "dist/TCG卡片居中度检测.app/Contents/MacOS/"

      - name: Ad-hoc code sign
        run: |
          codesign --force --deep --sign - "dist/TCG卡片居中度检测.app"
          echo "✓ Ad-hoc signed"

      - name: Package as zip
        run: |
          ditto -c -k --keepParent "dist/TCG卡片居中度检测.app" \
            "TCG卡片居中度检测_v0.1.5_macOS.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TCG卡片居中度检测_macOS
          path: TCG卡片居中度检测_v0.1.5_macOS.zip
          retention-days: 90
